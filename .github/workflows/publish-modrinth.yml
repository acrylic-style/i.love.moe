name: Publish Mod to Modrinth

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: Release notes shown on Modrinth
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minecraft
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Publish all supported versions
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID || 'i-love-moe' }}
          CHANGELOG: ${{ inputs.changelog || github.event.head_commit.message || github.ref_name }}
        run: ./gradlew modrinth --no-daemon
